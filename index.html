<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Kris Steps 👑</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #F0D080;
    --cream: #FDF8EF;
    --blush: #F5E6D8;
    --deep: #1A1008;
    --muted: #8A7560;
    --white: #FFFFFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--deep);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    padding-bottom: 24px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.45;
  }

  /* ── Header ── */
  header {
    width: 100%;
    text-align: center;
    padding: 28px 20px 0;
  }

  .crown { font-size: 26px; display: block; margin-bottom: 2px; animation: sway 3s ease-in-out infinite; }
  @keyframes sway { 0%,100%{transform:rotate(-6deg)} 50%{transform:rotate(6deg)} }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(26px, 8vw, 46px);
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1;
  }
  h1 span { color: var(--gold); font-style: italic; }

  .tagline {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 5px;
  }

  .divider {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 16px auto;
  }

  /* ── Status ── */
  .status {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--muted);
    letter-spacing: 1px; text-transform: uppercase;
    justify-content: center; margin-bottom: 6px;
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #CCC; }
  .status-dot.active { background: #4CAF50; animation: pulse 2s ease-in-out infinite; }
  .status-dot.error  { background: #E74C3C; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

  /* ── Step Ring ── */
  .step-ring {
    position: relative; width: 200px; height: 200px;
    margin: 4px auto 10px;
  }
  .step-ring svg { position: absolute; inset: 0; transform: rotate(-90deg); }
  .ring-track    { fill: none; stroke: #EDE0CC; stroke-width: 5; }
  .ring-progress {
    fill: none; stroke: var(--gold); stroke-width: 5;
    stroke-linecap: round; stroke-dasharray: 565;
    stroke-dashoffset: 565;
    transition: stroke-dashoffset .6s cubic-bezier(.4,0,.2,1);
  }
  .step-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .step-count {
    font-family: 'Playfair Display', serif;
    font-size: clamp(44px, 13vw, 68px);
    font-weight: 900; line-height: 1;
    transition: transform .15s ease;
  }
  .step-count.bump { animation: bump .25s ease; }
  @keyframes bump { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
  .step-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-top: 3px; }

  /* ── Milestone bar ── */
  .milestone-bar {
    width: calc(100% - 48px); max-width: 360px;
    margin: 0 auto 12px;
  }
  .milestone-text {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--muted); margin-bottom: 5px;
  }
  .milestone-track { height: 4px; background: #EDE0CC; border-radius: 2px; overflow: hidden; }
  .milestone-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 2px; width: 0%;
    transition: width .6s cubic-bezier(.4,0,.2,1);
  }

  /* ── Kris Photo Card ── */
  .kris-card {
    width: calc(100% - 48px); max-width: 360px;
    margin: 0 auto 14px;
    background: var(--white);
    border-radius: 20px;
    border: 1px solid #EDE0CC;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(26,16,8,.07);
    animation: slideIn .4s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes slideIn { from{transform:translateY(14px) scale(.95);opacity:0} to{transform:translateY(0) scale(1);opacity:1} }

  /* Photo container — clips to show only part of the full image */
  .kris-photo-wrap {
    width: 100%;
    height: 180px;
    overflow: hidden;
    position: relative;
  }
  .kris-photo {
    width: 100%;
    /* background-image set inline via JS */
    background-size: cover;
    background-repeat: no-repeat;
    height: 100%;
    transition: background-position .6s ease, filter .4s ease;
  }

  /* Gold shimmer overlay on the photo */
  .kris-photo::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 55%, rgba(255,255,255,.92) 100%);
  }

  .kris-info {
    padding: 14px 18px 18px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .kris-emoji-badge {
    font-size: 36px;
    line-height: 1;
    flex-shrink: 0;
    animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes popIn { from{transform:scale(0) rotate(-20deg)} to{transform:scale(1) rotate(0deg)} }

  .kris-text-block { flex: 1; }
  .kris-name {
    font-family: 'Playfair Display', serif;
    font-weight: 700; font-size: 13px;
    color: var(--gold); margin-bottom: 3px;
  }
  .kris-quote { font-size: 14px; line-height: 1.5; color: var(--deep); }
  .kris-milestone { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* ── Permission notice ── */
  .perm-notice {
    width: calc(100% - 48px); max-width: 360px;
    margin: 0 auto 12px;
    background: #FFF8EC; border: 1px solid #F0D080;
    border-radius: 12px; padding: 10px 14px;
    font-size: 12px; color: var(--muted);
    text-align: center; line-height: 1.5;
  }

  /* ── Buttons ── */
  .btn-row {
    display: flex; gap: 10px;
    width: calc(100% - 48px); max-width: 360px;
    margin: 0 auto;
  }
  .btn {
    flex: 1; padding: 15px 10px;
    border: none; border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
  }
  .btn:active { transform: scale(.96); }
  .btn-primary { background: var(--deep); color: var(--cream); letter-spacing: .5px; }
  .btn-share {
    background: var(--gold); color: var(--deep);
    font-weight: 700; letter-spacing: .5px;
    box-shadow: 0 4px 16px rgba(201,168,76,.35);
  }
  .btn-share:active { box-shadow: none; }

  /* ── Confetti ── */
  .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 200; display: none; }
  .cp {
    position: absolute; width: 8px; height: 8px; border-radius: 2px;
    animation: cf 1.2s ease-out forwards;
  }
  @keyframes cf { 0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1} 100%{transform:translateY(320px) rotate(720deg) scale(.2);opacity:0} }

  /* ── Gold flash ── */
  .flash { position: fixed; inset: 0; background: var(--gold); opacity: 0; pointer-events: none; z-index: 150; }
  .flash.fire { animation: fl .5s ease-out forwards; }
  @keyframes fl { 0%{opacity:.3} 100%{opacity:0} }

  footer {
    margin-top: 20px;
    font-size: 10px; color: var(--muted);
    text-align: center; letter-spacing: 1.5px;
  }
</style>
</head>
<body>

<div class="flash" id="flash"></div>
<div class="confetti-wrap" id="confetti"></div>

<header>
  <span class="crown">👑</span>
  <h1>Kris <span>Steps</span></h1>
  <p class="tagline">A momager-approved fitness app</p>
</header>

<div class="divider"></div>

<div class="status">
  <span class="status-dot" id="statusDot"></span>
  <span id="statusText">Tap Start to begin</span>
</div>

<div class="step-ring">
  <svg viewBox="0 0 180 180">
    <circle class="ring-track"    cx="90" cy="90" r="83"/>
    <circle class="ring-progress" id="ringProgress" cx="90" cy="90" r="83"/>
  </svg>
  <div class="step-center">
    <div class="step-count" id="stepCount">0</div>
    <div class="step-label">steps</div>
  </div>
</div>

<div class="milestone-bar">
  <div class="milestone-text">
    <span id="milestoneLabel">Next: 100 steps</span>
    <span id="milestonePct">0%</span>
  </div>
  <div class="milestone-track">
    <div class="milestone-fill" id="milestoneFill"></div>
  </div>
</div>

<!-- Kris Photo Card -->
<div class="kris-card" id="krisCard">
  <div class="kris-photo-wrap">
    <div class="kris-photo" id="krisPhoto"></div>
  </div>
  <div class="kris-info">
    <div class="kris-emoji-badge" id="krisEmoji">👸</div>
    <div class="kris-text-block">
      <div class="kris-name">Kris Jenner</div>
      <div class="kris-quote" id="krisQuote">You're doing amazing sweetie. Now start walking.</div>
      <div class="kris-milestone" id="krisMilestone"></div>
    </div>
  </div>
</div>

<div class="perm-notice" id="permNotice" style="display:none">
  📱 Tap "Start Counting" — iPhone requires motion permission (iOS 13+).
</div>

<div class="btn-row">
  <button class="btn btn-primary" id="mainBtn" onclick="handleMainBtn()">Start Counting</button>
  <button class="btn btn-share" onclick="handleShare()">✦ Share</button>
</div>

<footer>KRIS STEPS · FOR THE CULTURE · EST. 2025</footer>

  const IMG_SRC = "data:image/jpeg;base64," + IMG_B64;

  // background-position-y values to crop each half
  // We use background-size: cover on a 180px tall box; image is ~2:1 tall
  // top half  → position 0% (show top)
  // bottom half → position 100% (show bottom)
  const PHOTO_TOP    = "center 15%";   // glowy saint Kris
  const PHOTO_BOTTOM = "center 80%";   // empress Kris

  const krisPhoto = document.getElementById('krisPhoto');
  krisPhoto.style.backgroundImage = `url(${IMG_SRC})`;
  krisPhoto.style.backgroundPosition = PHOTO_TOP;
  krisPhoto.style.backgroundSize = "cover";

  // ── Data ───────────────────────────────────────────────────────────────────
  const MILESTONES = [
    { steps:   100, emoji:'😏', quote:"Okay, you actually moved. I'm impressed. A little.",            photo: PHOTO_TOP },
    { steps:   250, emoji:'💅', quote:"That's cute. But have you checked your notifications? Neither have I — I'm too busy managing.",  photo: PHOTO_TOP },
    { steps:   500, emoji:'🥂', quote:"Five hundred steps! We're celebrating. I'll have Khloé call the caterer.",                       photo: PHOTO_TOP },
    { steps:  1000, emoji:'😤', quote:"A thousand steps! You're officially on-brand. The brand is walking.",                            photo: PHOTO_TOP },
    { steps:  2000, emoji:'👑', quote:"Two thousand. That's more steps than I take in a week. I have people for that.",                 photo: PHOTO_BOTTOM },
    { steps:  5000, emoji:'🚨', quote:"FIVE THOUSAND?? This is a crisis. A beautiful, inspiring crisis. I'm calling PMK.",             photo: PHOTO_BOTTOM },
    { steps:  8000, emoji:'🫣', quote:"Are you okay?? Who walks this much?? Call me. Actually, call my assistant.",                     photo: PHOTO_BOTTOM },
    { steps: 10000, emoji:'🎉', quote:"TEN THOUSAND STEPS. I'm putting you in the family. The Jenner name is yours.",                  photo: PHOTO_BOTTOM },
    { steps: 15000, emoji:'😱', quote:"You've walked more than I've walked in my entire life. I don't know how to feel.",              photo: PHOTO_BOTTOM },
    { steps: 20000, emoji:'🏆', quote:"Twenty thousand. You're a brand now. I'm your momager. We need to talk deals.",                 photo: PHOTO_BOTTOM },
  ];

  const IDLE = [
    { emoji:'👸', quote:"You're doing amazing sweetie. Now start walking.", photo: PHOTO_TOP },
    { emoji:'☕', quote:"I was just sitting here, managing things. You should walk.", photo: PHOTO_TOP },
    { emoji:'📱', quote:"Every step is content. Every step is a brand moment.", photo: PHOTO_TOP },
    { emoji:'💼', quote:"I didn't build this empire by standing still. Move.", photo: PHOTO_BOTTOM },
    { emoji:'🌟', quote:"The only bad step is no step. And bad press. But mostly no step.", photo: PHOTO_BOTTOM },
  ];

  // ── State ──────────────────────────────────────────────────────────────────
  let steps = 0, tracking = false, lastAccel = null;
  let stepCooldown = false, lastMilestone = 0;
  const CIRC = 521; // 2π × 83

  // ── DOM ────────────────────────────────────────────────────────────────────
  const stepCountEl   = document.getElementById('stepCount');
  const ringProgress  = document.getElementById('ringProgress');
  const mainBtn       = document.getElementById('mainBtn');
  const statusDot     = document.getElementById('statusDot');
  const statusText    = document.getElementById('statusText');
  const krisCard      = document.getElementById('krisCard');
  const krisEmoji     = document.getElementById('krisEmoji');
  const krisQuote     = document.getElementById('krisQuote');
  const krisMilestone = document.getElementById('krisMilestone');
  const milestoneFill = document.getElementById('milestoneFill');
  const milestoneLabel= document.getElementById('milestoneLabel');
  const milestonePct  = document.getElementById('milestonePct');
  const permNotice    = document.getElementById('permNotice');
  const flash         = document.getElementById('flash');
  const confettiEl    = document.getElementById('confetti');

  // ── Motion ─────────────────────────────────────────────────────────────────
  function handleMotion(e) {
    const a = e.accelerationIncludingGravity || e.acceleration;
    if (!a) return;
    const mag = Math.sqrt((a.x||0)**2 + (a.y||0)**2 + (a.z||0)**2);
    if (!lastAccel) { lastAccel = mag; return; }
    const delta = Math.abs(mag - lastAccel);
    lastAccel = mag;
    if (delta > 1.2 && !stepCooldown) {
      steps++;
      stepCooldown = true;
      setTimeout(() => stepCooldown = false, 350);
      updateUI();
      checkMilestone();
    }
  }

  // ── UI ─────────────────────────────────────────────────────────────────────
  function updateUI() {
    stepCountEl.textContent = steps.toLocaleString();
    stepCountEl.classList.remove('bump');
    void stepCountEl.offsetWidth;
    stepCountEl.classList.add('bump');

    const pct = Math.min(steps / 10000, 1);
    ringProgress.style.strokeDashoffset = CIRC - pct * CIRC;

    const next = MILESTONES.find(m => m.steps > steps);
    const prevSteps = (() => { const p = MILESTONES.filter(m => m.steps <= steps); return p.length ? p[p.length-1].steps : 0; })();
    if (next) {
      const prog = (steps - prevSteps) / (next.steps - prevSteps) * 100;
      milestoneFill.style.width = Math.min(prog, 100) + '%';
      milestoneLabel.textContent = `Next: ${next.steps.toLocaleString()} steps`;
      milestonePct.textContent = Math.round(Math.min(prog, 100)) + '%';
    } else {
      milestoneFill.style.width = '100%';
      milestoneLabel.textContent = "You're a legend 👑";
      milestonePct.textContent = '100%';
    }
  }

  function showKrisReaction(data, milestoneSteps) {
    krisEmoji.textContent = data.emoji;
    krisQuote.textContent = data.quote;
    krisMilestone.textContent = milestoneSteps ? `📍 ${milestoneSteps.toLocaleString()} steps reached` : '';
    krisPhoto.style.backgroundPosition = data.photo;

    // Re-trigger animations
    krisCard.style.animation = 'none';
    void krisCard.offsetWidth;
    krisCard.style.animation = 'slideIn .4s cubic-bezier(.34,1.56,.64,1)';

    krisEmoji.style.animation = 'none';
    void krisEmoji.offsetWidth;
    krisEmoji.style.animation = 'popIn .4s cubic-bezier(.34,1.56,.64,1)';
  }

  function checkMilestone() {
    const reached = MILESTONES.find(m => m.steps <= steps && m.steps > lastMilestone);
    if (!reached) return;
    lastMilestone = reached.steps;

    // Flash + confetti
    flash.classList.remove('fire');
    void flash.offsetWidth;
    flash.classList.add('fire');
    spawnConfetti();
    if (navigator.vibrate) navigator.vibrate([80,40,80]);

    showKrisReaction(reached, reached.steps);
  }

  function spawnConfetti() {
    confettiEl.style.display = 'block';
    confettiEl.innerHTML = '';
    const colors = ['#C9A84C','#F0D080','#1A1008','#F5E6D8','#fff','#E8A0A0'];
    for (let i = 0; i < 32; i++) {
      const p = document.createElement('div');
      p.className = 'cp';
      p.style.cssText = `left:${Math.random()*100}%;top:${15+Math.random()*35}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*.35}s;animation-duration:${.9+Math.random()*.7}s;transform:rotate(${Math.random()*360}deg)`;
      confettiEl.appendChild(p);
    }
    setTimeout(() => confettiEl.style.display = 'none', 1900);
  }

  // ── Start / Stop ────────────────────────────────────────────────────────────
  function setStatus(cls, txt) {
    statusDot.className = 'status-dot ' + cls;
    statusText.textContent = txt;
  }

  async function handleMainBtn() {
    if (tracking) {
      window.removeEventListener('devicemotion', handleMotion);
      tracking = false;
      mainBtn.textContent = 'Start Counting';
      setStatus('', 'Paused');
      const q = IDLE[Math.floor(Math.random() * IDLE.length)];
      showKrisReaction(q, null);
      return;
    }

    if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
      permNotice.style.display = 'block';
      try {
        const p = await DeviceMotionEvent.requestPermission();
        if (p !== 'granted') {
          setStatus('error', 'Permission denied');
          showKrisReaction({ emoji:'😤', quote:"You denied me. I've never been denied. I'm calling my lawyer.", photo: PHOTO_TOP }, null);
          return;
        }
        permNotice.style.display = 'none';
      } catch(e) { setStatus('error', 'Permission error'); return; }
    } else if (typeof DeviceMotionEvent === 'undefined') {
      setStatus('error', 'No motion sensor');
      showKrisReaction({ emoji:'🤷', quote:"Your device has no motion sensor. Even I need a phone upgrade sometimes.", photo: PHOTO_TOP }, null);
      return;
    }

    window.addEventListener('devicemotion', handleMotion);
    tracking = true;
    mainBtn.textContent = 'Pause';
    setStatus('active', 'Counting steps');
    showKrisReaction({ emoji:'🏃', quote:"Walk like there's a camera on you. There probably is. I arranged it.", photo: PHOTO_TOP }, null);
  }

  // ── Share ───────────────────────────────────────────────────────────────────
  function handleShare() {
    const last = MILESTONES.filter(m => m.steps <= steps).pop();
    const txt = last
      ? `I just hit the ${last.steps.toLocaleString()}-step milestone on Kris Steps! You're doing amazing sweetie 👑 #KrisSteps #DoingAmazingSweetie`
      : `I've walked ${steps.toLocaleString()} steps on Kris Steps — the momager-approved fitness app 👑 #KrisSteps`;
    if (navigator.share) {
      navigator.share({ title:'Kris Steps 👑', text:txt, url:window.location.href }).catch(()=>{});
    } else {
      navigator.clipboard?.writeText(txt + '\n' + window.location.href).then(() => {
        const b = document.querySelector('.btn-share');
        const orig = b.textContent;
        b.textContent = '✓ Copied!';
        setTimeout(() => b.textContent = orig, 2000);
      }).catch(() => alert(txt));
    }
  }

  // ── Init ────────────────────────────────────────────────────────────────────
  if (/iPad|iPhone|iPod/.test(navigator.userAgent)) permNotice.style.display = 'block';
  updateUI();
</script>
